
<style>
*{box-sizing:border-box;margin:0;padding:0}
#kiosk{border:1.5px solid #1a3a6e;border-radius:12px;overflow:hidden;display:flex;flex-direction:column;background:var(--color-background-primary)}
#hdr{background:#1a3a6e;color:#fff;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;gap:8px}
#hdr-left{display:flex;flex-direction:column}
#hdr-left span{font-size:9px;letter-spacing:1.5px;opacity:.65;text-transform:uppercase}
#hdr-left strong{font-size:14px;font-weight:500}
#hdr-right{font-size:12px;opacity:.7}
#ftabs{background:#12295a;display:flex;padding:0 12px;gap:2px;overflow-x:auto}
.ftab{padding:7px 12px;font-size:11px;color:rgba(255,255,255,.55);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s}
.ftab.on{color:#fff;border-bottom-color:#f5a623}
#body{display:flex;flex:1;min-height:0}
#mapwrap{flex:1;overflow:auto;background:var(--color-background-secondary);position:relative}
#mapsvg{display:block}
#sidebar{width:210px;flex-shrink:0;display:flex;flex-direction:column;border-left:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);overflow:hidden}
#srchwrap{padding:10px}
#srch{width:100%;padding:6px 10px;font-size:12px;border:0.5px solid var(--color-border-secondary);border-radius:8px;background:var(--color-background-secondary);color:var(--color-text-primary);outline:none}
#srch:focus{border-color:#5ba3f5}
#cats{display:flex;flex-wrap:wrap;gap:4px;padding:0 10px 8px;border-bottom:0.5px solid var(--color-border-tertiary)}
.cat{padding:3px 7px;font-size:10px;border-radius:99px;border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-secondary);cursor:pointer;transition:all .12s}
.cat.on{background:#1a3a6e;color:#fff;border-color:#1a3a6e}
#rlist{flex:1;overflow-y:auto}
.ri{padding:8px 10px;border-bottom:0.5px solid var(--color-border-tertiary);cursor:pointer;transition:background .1s}
.ri:hover{background:var(--color-background-secondary)}
.ri.on{background:#e8f0fc}
.rn{font-size:12px;font-weight:500;color:var(--color-text-primary)}
.rm{font-size:10px;color:var(--color-text-secondary);margin-top:2px}
.rb{display:inline-block;padding:1px 5px;border-radius:99px;font-size:9px;margin-top:3px}
#det{border-top:0.5px solid var(--color-border-tertiary);padding:10px;flex-shrink:0;background:var(--color-background-secondary);min-height:100px}
#det h3{font-size:12px;font-weight:500;color:var(--color-text-primary)}
#det p{font-size:11px;color:var(--color-text-secondary);margin-top:3px;line-height:1.5}
.dr{font-size:10px;color:var(--color-text-secondary);margin-top:5px}
.yah{position:absolute;width:12px;height:12px;border-radius:50%;background:#ef4444;border:2px solid white;animation:yp 1.5s infinite;pointer-events:none}
@keyframes yp{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.5)}50%{box-shadow:0 0 0 6px rgba(239,68,68,0)}}
.leg{position:absolute;bottom:8px;left:8px;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:8px;padding:7px 9px;display:flex;flex-direction:column;gap:3px}
.li{display:flex;align-items:center;gap:5px;font-size:9px;color:var(--color-text-secondary)}
.lc{width:9px;height:9px;border-radius:2px;flex-shrink:0}
</style>

let curF=1, sel=null, q='', cat='all';

function abbr(name){
  if(name.length<=10)return name;
  return name.replace('Laboratory','Lab').replace('Computer','Comp').replace('Physical Therapy','PT').replace('Co-Curricular','Co-Curr').replace('Tamaraw ','');
}

function wrap(text,maxW,fontSize){
  const approxCW=fontSize*0.55;
  const charsPerLine=Math.floor(maxW/approxCW);
  const words=text.split(' ');
  const lines=[];let cur='';
  words.forEach(w=>{
    if((cur+' '+w).trim().length<=charsPerLine) cur=(cur+' '+w).trim();
    else{if(cur)lines.push(cur);cur=w;}
  });
  if(cur)lines.push(cur);
  return lines.slice(0,3);
}

function visible(r){
  const mc=cat==='all'||r.type===cat;
  const mq=!q||r.name.toLowerCase().includes(q.toLowerCase())||r.desc.toLowerCase().includes(q.toLowerCase());
  return mc&&mq;
}

function renderMap(){
  const svg=document.getElementById('mapsvg');
  const ns='http://www.w3.org/2000/svg';
  svg.innerHTML='';
  const fd=floors[curF];

  const corr1=document.createElementNS(ns,'rect');
  corr1.setAttribute('x',20);corr1.setAttribute('y',118);corr1.setAttribute('width',660);corr1.setAttribute('height',16);
  corr1.setAttribute('fill','#cbd5e1');corr1.setAttribute('rx','2');
  svg.appendChild(corr1);
  const corr2=document.createElementNS(ns,'rect');
  corr2.setAttribute('x',20);corr2.setAttribute('y',226);corr2.setAttribute('width',660);corr2.setAttribute('height',12);
  corr2.setAttribute('fill','#cbd5e1');corr2.setAttribute('rx','2');
  svg.appendChild(corr2);

  const lbg=document.createElementNS(ns,'rect');
  lbg.setAttribute('x',20);lbg.setAttribute('y',148);lbg.setAttribute('width',660);lbg.setAttribute('height',72);
  lbg.setAttribute('fill','#f8fafc');lbg.setAttribute('rx','2');
  svg.appendChild(lbg);
  const lt=document.createElementNS(ns,'text');
  lt.setAttribute('x',350);lt.setAttribute('y',192);lt.setAttribute('text-anchor','middle');
  lt.setAttribute('font-size','22');lt.setAttribute('font-weight','700');lt.setAttribute('fill','#1e3a5f');
  lt.setAttribute('font-family','sans-serif');lt.setAttribute('opacity','0.12');
  lt.textContent='ST. BENEDICT HALL – '+(curF===1?'1ST':curF===2?'2ND':curF===3?'3RD':curF===4?'4TH':'5TH')+' FLOOR';
  svg.appendChild(lt);

  const stl=document.createElementNS(ns,'text');
  stl.setAttribute('x',105);stl.setAttribute('y',127);stl.setAttribute('font-size','8');stl.setAttribute('fill','#94a3b8');stl.setAttribute('font-family','sans-serif');
  stl.textContent='CORRIDOR';svg.appendChild(stl);

  fd.rooms.forEach(r=>{
    const vis=visible(r);
    const isSel=sel&&sel.id===r.id;
    const c=C[r.type];
    const g=document.createElementNS(ns,'g');
    g.style.cursor='pointer';g.style.opacity=vis?'1':'0.2';

    const rect=document.createElementNS(ns,'rect');
    rect.setAttribute('x',r.x);rect.setAttribute('y',r.y);rect.setAttribute('width',r.w);rect.setAttribute('height',r.h);
    rect.setAttribute('fill',c.f);rect.setAttribute('stroke',isSel?'#f5a623':c.s);
    rect.setAttribute('stroke-width',isSel?'2.5':'1');rect.setAttribute('rx','4');
    g.appendChild(rect);

    const fontSize=r.w<60?8:r.w<80?9:10;
    const label=abbr(r.name);
    const lines=wrap(label,r.w-8,fontSize);
    const totalH=lines.length*(fontSize+3);
    const startY=r.y+r.h/2-totalH/2+fontSize;

    lines.forEach((line,i)=>{
      const t=document.createElementNS(ns,'text');
      t.setAttribute('x',r.x+r.w/2);t.setAttribute('y',startY+i*(fontSize+3));
      t.setAttribute('text-anchor','middle');t.setAttribute('font-size',fontSize);
      t.setAttribute('font-weight','500');t.setAttribute('fill',c.s);t.setAttribute('font-family','sans-serif');
      t.textContent=line;g.appendChild(t);
    });

    g.addEventListener('click',()=>{if(vis)selectRoom(r);});
    svg.appendChild(g);
  });

  const yah=document.getElementById('yah');
  yah.style.left=(fd.yah[0]-6)+'px';yah.style.top=(fd.yah[1]-6)+'px';
}

function renderList(){
  const list=document.getElementById('rlist');
  list.innerHTML='';
  const rooms=floors[curF].rooms.filter(visible);
  rooms.forEach(r=>{
    const c=C[r.type];
    const d=document.createElement('div');
    d.className='ri'+(sel&&sel.id===r.id?' on':'');
    d.innerHTML=`<div class="rn">${r.name}</div><div class="rm">${r.desc}</div><span class="rb" style="background:${c.bb};color:${c.tb}">${r.type}</span>`;
    d.addEventListener('click',()=>selectRoom(r));
    list.appendChild(d);
  });
  if(!rooms.length) list.innerHTML='<div style="padding:14px;text-align:center;font-size:11px;color:var(--color-text-secondary)">No results</div>';
}

function selectRoom(r){
  sel=r;renderMap();renderList();
  const c=C[r.type];
  document.getElementById('det').innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:6px">
      <h3>${r.name}</h3>
      <span class="rb" style="background:${c.bb};color:${c.tb};flex-shrink:0">${r.type}</span>
    </div>
    <p style="margin-top:5px">${r.desc}</p>
    <div class="dr" style="margin-top:5px"><span style="background:#f1f5f9;padding:2px 5px;border-radius:4px;color:#475569;font-size:9px">${r.hrs}</span></div>
    <div class="dr" style="margin-top:8px"><span style="color:#3b82f6;cursor:pointer;font-size:10px" onclick="sendPrompt('Give me directions to ${r.name} in St. Benedict Hall OLFU Valenzuela, floor ${curF}')">Get directions ↗</span></div>
  `;
}

document.querySelectorAll('.ftab').forEach(t=>{
  t.addEventListener('click',()=>{
    document.querySelectorAll('.ftab').forEach(x=>x.classList.remove('on'));
    t.classList.add('on');
    curF=parseInt(t.dataset.f);sel=null;
    document.getElementById('det').innerHTML='<p style="color:var(--color-text-secondary);font-size:11px">Tap a room to see details</p>';
    renderMap();renderList();
  });
});

document.getElementById('srch').addEventListener('input',e=>{q=e.target.value;renderMap();renderList();});

document.querySelectorAll('.cat').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.cat').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');cat=b.dataset.c;renderMap();renderList();
  });
});

function tick(){
  document.getElementById('hdr-right').textContent=new Date().toLocaleTimeString('en-PH',{hour:'2-digit',minute:'2-digit'});
}
tick();setInterval(tick,1000);
renderMap();renderList();
